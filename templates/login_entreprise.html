<!DOCTYPE html>
<html lang="fr" data-theme="{{ theme|default('dark') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirWatch — Espace Entreprise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}?v={{ app_build|default('3') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="theme-color" content="{% if theme == 'light' %}#F9FAFB{% else %}#0F172A{% endif %}">
    <meta name="color-scheme" content="{% if theme == 'light' %}light{% else %}dark{% endif %}">
</head>
<body data-theme="{{ theme|default('dark') }}">
    <div class="login-page">
        <div class="login-shell">
            <div class="login-top-bar">
                <a href="{{ url_for('toggle_theme') }}" class="login-theme-btn"
                   title="{% if theme == 'dark' %}Activer le mode clair{% else %}Activer le mode sombre{% endif %}"
                   aria-label="{% if theme == 'dark' %}Activer le mode clair{% else %}Activer le mode sombre{% endif %}">
                    {% if theme == 'dark' %}
                    <i class="fas fa-sun" aria-hidden="true"></i>
                    {% else %}
                    <i class="fas fa-moon" aria-hidden="true"></i>
                    {% endif %}
                </a>
            </div>

            <div class="login-card">
                <div class="login-brand">
                    <img class="login-brand-icon" src="{{ url_for('static', filename='logo_b2b.png') }}" alt="Logo AirWatch" aria-hidden="true">
                    <div>
                        <h1>AirWatch Entreprise</h1>
                        <p class="login-subtitle">Portail industriel — Suivi CO2 Wash</p>
                    </div>
                </div>

                {% if error %}
                <div class="login-error" role="alert">{{ error }}</div>
                {% endif %}

                <form method="POST" class="login-form">
                    <div class="form-group">
                        <label for="username">Nom d'utilisateur</label>
                        <input type="text" id="username" name="username" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login">Connexion sécurisée</button>
                </form>

                <p class="login-back">
                    <a href="/"><i class="fas fa-arrow-left" style="margin-right:0.35rem;"></i>Retour au site public</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
